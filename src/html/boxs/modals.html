<div class="modal" id="modal-feedback">
  <div class="modal__body">
    <button class="modal-feedback__close modal__close btn-reset js-close-modal">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <use xlink:href="img/sprite.svg#modalClose"></use>
      </svg>
    </button>

    <div class="modal-feedback__window">
      <form class="js-form">
        <div class="form-type-1">
          <h3 class="form-type-1__title">Запрос на подбор</h3>
          <label class="input-type-1">
            <input class="input-type-1__input required" type="text" placeholder="Ваше имя">
            <span class="message-error">Это поле не может быть пустым</span>
          </label>

          <label class="input-type-1">
            <input class="input-type-1__input js-phone-mask required required-phone" type="text" placeholder="Телефон">
            <span class="message-error">Это поле не может быть пустым</span>
          </label>

          <label class="input-type-1">
            <input class="input-type-1__input required required-mail" type="text" placeholder="Эл. адрес">
            <span class="message-error">Это поле не может быть пустым</span>
          </label>

          <label class="textarea-type-1">
            <textarea class="textarea-type-1__text" placeholder="Ваше сообщение"></textarea>
            <span class="message-error">Это поле не может быть пустым</span>
          </label>

          <button class="btn-reset btn-submit-type-1 btn-order">
            <span class="text">Отправить сообщение</span>
          </button>

          <label class="checkbox-type-1">
            <input class="checkbox-type-1__input required-checkbox required" type="checkbox" checked>
            <span class="castom">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="9" viewBox="0 0 11 9" fill="none">
                <path d="M9.69995 0.700012L3.39995 8.20001L0.699951 5.20001" stroke="#F60114" stroke-width="1.4"
                  stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
            <p class="checkbox-type-1__desc">
              Нажимая кнопку «Рассчитать стоимость» вы даёте согласие с <a href="#">политикой обработки персональных данных</a>
            </p>
          </label>
        </div>
      </form>
    </div>
  </div>
</div>
