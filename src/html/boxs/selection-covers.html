<section class="background-gray-10 mt-156">
  <div class="container">
    <div class="write-us selection-covers">
      <div class="write-us__box-img">
        <img src="img/write-us/2.jpg" alt="img">
      </div>

      <div class="write-us__wrapper">
        <div class="section-title padding-none">
          <h2 class="section-title__text">Подберём чехлы<br>под ваш автомобиль</h2>
        </div>
        <form class="js-form">
          <div class="form-type-1">
            <p class="form-type-1__desc">Если вы не знаете, с чего начать — заполните анкету. Мы предложим варианты
              дизайна под вашу модель.</p>

            <div class="drop-down-type-1">
              <label class="drop-down-type-1__label">
                <input class="drop-down-type-1__input required" type="text" placeholder="Выберите бренд">
                <span class="message-error">Это поле не может быть пустым</span>
              </label>

              <button class="drop-down-type-1__btn btn-reset">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <use xlink:href="img/sprite.svg#dropDownBtn"></use>
                </svg>
              </button>

              <div class="drop-down-type-1__choice">

                <div class="min-search">
                  <!--<form>-->
                    <div class="min-search__line">
                      <input class="min-search__input" type="text" placeholder="Начните вводить название">

                      <button class="min-search__subnit btn-reset" type="submit">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                          <use xlink:href="img/sprite.svg#minSearch"></use>
                        </svg>
                      </button>
                    </div>
                  <!--</form>-->
                </div>

                <div class="drop-down-type-1__list">
                  <span class="drop-down-type-1__item">Chery</span>
                  <span class="drop-down-type-1__item">Chevrolet</span>
                  <span class="drop-down-type-1__item">Daewoo</span>
                  <span class="drop-down-type-1__item">Datsun</span>
                  <span class="drop-down-type-1__item">Ford</span>
                </div>

              </div>

            </div>

            <div class="drop-down-type-1">
              <label class="drop-down-type-1__label">
                <input class="drop-down-type-1__input required" type="text" placeholder="Выберите модель">
                <span class="message-error">Это поле не может быть пустым</span>
              </label>

              <button class="drop-down-type-1__btn btn-reset">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <use xlink:href="img/sprite.svg#dropDownBtn"></use>
                </svg>
              </button>

              <div class="drop-down-type-1__choice">

                <div class="min-search">
                  <!--<form>-->
                    <div class="min-search__line">
                      <input class="min-search__input" type="text" placeholder="Начните вводить название">

                      <button class="min-search__subnit btn-reset" type="submit">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                          <use xlink:href="img/sprite.svg#minSearch"></use>
                        </svg>
                      </button>
                    </div>
                  <!--</form>-->
                </div>

                <div class="drop-down-type-1__list">
                  <span class="drop-down-type-1__item">afaw</span>
                  <span class="drop-down-type-1__item">Cheasd vrolet</span>
                  <span class="drop-down-type-1__item">asfasf</span>
                  <span class="drop-down-type-1__item">sdfsdf-sdf</span>
                  <span class="drop-down-type-1__item">afaf</span>
                  <span class="drop-down-type-1__item">asfasf</span>
                  <span class="drop-down-type-1__item">sdfsdf-sdf</span>
                  <span class="drop-down-type-1__item">afaf</span>
                </div>

              </div>

            </div>

            <div class="drop-down-type-1">
              <label class="drop-down-type-1__label">
                <input class="drop-down-type-1__input required" type="text" placeholder="Выберите диапазон цен">
                <span class="message-error">Это поле не может быть пустым</span>
              </label>

              <button class="drop-down-type-1__btn btn-reset">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <use xlink:href="img/sprite.svg#dropDownBtn"></use>
                </svg>
              </button>

              <div class="drop-down-type-1__choice">

                <div class="min-search">
                  <!--<form>-->
                    <div class="min-search__line">
                      <input class="min-search__input" type="text" placeholder="Начните вводить название">

                      <button class="min-search__subnit btn-reset" type="submit">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                          <use xlink:href="img/sprite.svg#minSearch"></use>
                        </svg>
                      </button>
                    </div>
                  <!--</form>-->
                </div>

                <div class="drop-down-type-1__list">
                  <span class="drop-down-type-1__item">10-20</span>
                  <span class="drop-down-type-1__item">50-60</span>
                  <span class="drop-down-type-1__item">100-120</span>
                </div>

              </div>

            </div>

            <button class="btn-reset btn-submit-type-1 btn-order">
              <span class="text">Отправить сообщение</span>
            </button>

            <label class="checkbox-type-1">
              <input class="checkbox-type-1__input required-checkbox required" type="checkbox" checked>
              <span class="castom">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="9" viewBox="0 0 11 9" fill="none">
                  <path d="M9.69995 0.700012L3.39995 8.20001L0.699951 5.20001" stroke="#F60114" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </span>
              <p class="checkbox-type-1__desc">
                Нажимая кнопку «Рассчитать стоимость» вы даёте согласие с <a href="#">политикой обработки персональных
                  данных</a>
              </p>
            </label>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
