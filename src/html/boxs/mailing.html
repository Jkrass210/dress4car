<section class="mailing mt-156">
  <div class="container">
    <div class="mailing__wrapper">
      <div class="mailing__left">
        <h2 class="mailing__title">
          Подписывайтесь на рассылку<br>Будьте в курсе акций и новинок
        </h2>
      </div>

      <div class="mailing__right">
        <form>
          <div class="mailing-form">
            <label class="mailing-intut">
              <input class="mailing-intut__input" type="text" placeholder="Ваш электронный адрес">
            </label>
            <label class="checkbox-type-1">
              <input class="checkbox-type-1__input" type="checkbox">
              <span class="castom">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="9" viewBox="0 0 11 9" fill="none">
                  <path d="M9.69995 0.700012L3.39995 8.20001L0.699951 5.20001" stroke="#F60114" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <p class="checkbox-type-1__desc">
                Нажимая кнопку «Подписаться» вы даёте согласие с <a href="#">политикой обработки персональных данных</a>
              </p>
            </label>
            <button class="mailing-submit btn-reset">
              <span class="text">Подписаться</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
